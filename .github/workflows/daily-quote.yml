name: Daily Quote Log

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  log-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run script
        run: python script.py

      - name: Commit and push if there are changes
        run: |
          git config user.name "ygangeshwar954-max"
          git config user.email "ygangeshwar954@gmail.com"
          git add log/
          git diff --staged --quiet || git commit -m "Daily quote log: $(date -u +'%Y-%m-%d')"
          git push
